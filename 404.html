<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Page Not Found | Blenderizm</title>
  <meta name="description" content="The page you requested could not be found. Explore Blenderizm’s 3D modeling, product visualization, and rendering services instead.">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https: data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <link rel="canonical" href="https://topazonanton.github.io/3DFreelancer-Blender/404.html">
  <style>
    :root {
      color-scheme: dark;
      --bg: #040404;
      --panel: rgba(255,255,255,0.05);
      --text: #f0ece4;
      --muted: #999490;
      --accent: #ff6a00;
      font-family: Arial, Helvetica, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 680px;
      width: 100%;
      background: var(--panel);
      border: 1px solid rgba(255,106,0,0.2);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      color: var(--accent);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-size: 0.8rem;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.05rem;
      margin: 0 0 24px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a {
      color: var(--text);
      text-decoration: none;
      background: var(--accent);
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
    }
    a.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.16);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">404 Error</div>
    <h1>Page not found</h1>
    <p>The page you were looking for may have moved, been removed, or the URL may be incorrect. You can return to the homepage or request a custom 3D project quote.</p>
    <div class="actions">
      <a href="/">Back to homepage</a>
      <a class="secondary" href="/offer.html">Request a quote</a>
    </div>
  </main>
</body>
</html>
